<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIoT Planter - 登入</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['DM Sans', 'sans-serif'], mono: ['DM Mono', 'monospace'] } } }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="min-h-screen bg-zinc-50 flex items-center justify-center font-sans">

  <div class="w-full max-w-sm px-4">

    <div class="text-center mb-8">
      <span class="font-mono text-sm text-zinc-900 tracking-tight">🌿 AIoT Planter</span>
    </div>

    <div class="bg-white border border-zinc-200 rounded-2xl p-8 shadow-sm" x-data="loginForm()">
      <h1 class="text-sm font-semibold text-zinc-900 mb-6">系統登入</h1>

      <form @submit.prevent="submitForm" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-zinc-500 mb-1.5">Gmail 帳號</label>
          <input type="email" x-model="formData.email" placeholder="yourname@gmail.com"
            required autocomplete="email"
            class="w-full px-3 py-2 text-sm bg-zinc-50 border border-zinc-200 rounded-lg text-zinc-900
                   placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-zinc-900
                   focus:border-transparent transition">
        </div>
        <div>
          <label class="block text-xs font-medium text-zinc-500 mb-1.5">密碼</label>
          <input type="password" x-model="formData.password" placeholder="請輸入密碼"
            required autocomplete="current-password"
            class="w-full px-3 py-2 text-sm bg-zinc-50 border border-zinc-200 rounded-lg text-zinc-900
                   placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-zinc-900
                   focus:border-transparent transition">
        </div>

        <button type="submit" :disabled="isLoading"
          class="w-full flex items-center justify-center gap-2 px-4 py-2.5 mt-2
                 bg-zinc-900 hover:bg-zinc-700 disabled:bg-zinc-300
                 text-white text-sm font-medium rounded-lg transition">
          <svg x-show="isLoading" class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span x-text="isLoading ? '登入中...' : '登入'"></span>
        </button>

        <p x-show="errorMessage" class="text-xs text-red-500 text-center pt-1" x-text="errorMessage"></p>
      </form>

      <p class="text-center text-xs text-zinc-400 mt-6">
        第一盆植物？
        <a href="register.html" class="text-zinc-900 font-medium hover:underline">點我註冊</a>
      </p>
    </div>

  </div>

  <script>
    const API_BASE = window.API_BASE || 'http://localhost:3000';

    function loginForm() {
      return {
        formData: { email: '', password: '' },
        isLoading: false,
        errorMessage: '',

        async submitForm() {
          this.isLoading = true;
          this.errorMessage = '';
          try {
            const res = await fetch(`${API_BASE}/api/login`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.formData)
            });
            const result = await res.json();
            if (result.success) {
              localStorage.setItem('planter_token', result.data.token);
              localStorage.setItem('planter_user', JSON.stringify(result.data.user));
              window.location.href = 'dashboard.html';
            } else {
              this.errorMessage = result.error || '帳號或密碼錯誤';
            }
          } catch (err) {
            this.errorMessage = '伺服器連線失敗，請確認後端是否啟動';
          } finally {
            this.isLoading = false;
          }
        }
      }
    }
  </script>

</body>
</html>
